services:
  postgres:
    image: postgres:15-alpine
    container_name: dpms_postgres
    restart: always
    environment:
      POSTGRES_DB: dpms
      POSTGRES_USER: dpms_user
      POSTGRES_PASSWORD: your_secure_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

volumes:
  postgres_data:
